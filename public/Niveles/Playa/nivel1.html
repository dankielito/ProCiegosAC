<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 1: Conceptos Básicos</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .exercise-card { background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 500px; margin: 50px auto; border-bottom: 8px solid #ddd; }
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-inner { height: 100%; background: #2ecc71; width: 0%; transition: 0.5s; }
        .target-text { font-size: 2.5rem; color: #001F3F; font-weight: 800; margin-bottom: 20px; }
        .btn-mic { width: 100px; height: 100px; border-radius: 50%; background: #001F3F; color: white; font-size: 2rem; border: none; cursor: pointer; }
        .btn-mic.recording { background: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body style="background: #f1c40f;">

    <div class="exercise-card">
        <div class="progress-bar"><div class="progress-inner" id="prog"></div></div>
        <p id="type-label">Palabra 1 de 5</p>
        <div class="target-text" id="target">Hello</div>
        <p>Presiona el micrófono y pronuncia la palabra</p>
        
        <button class="btn-mic" id="micBtn"><i class="fas fa-microphone"></i></button>
        
        <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
    </div>

    <script>
        const exercises = [
            { t: "Hello", type: "Palabra" },
            { t: "Apple", type: "Palabra" },
            { t: "Computer", type: "Palabra" },
            { t: "I am a student", type: "Oración" },
            { t: "The sky is blue", type: "Oración" }
        ];

        let current = 0;
        const micBtn = document.getElementById('micBtn');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        micBtn.onclick = () => {
            recognition.start();
            micBtn.classList.add('recording');
        };

        recognition.onresult = (event) => {
            micBtn.classList.remove('recording');
            const transcript = event.results[0][0].transcript.toLowerCase();
            const target = exercises[current].t.toLowerCase();

            if(transcript === target) {
                document.getElementById('result').innerHTML = "¡Excelente! ✨";
                current++;
                if(current < exercises.length) {
                    setTimeout(updateExercise, 1500);
                } else {
                    alert("¡Nivel Completado!");
                    window.location.href = "../../dashboard.html";
                }
            } else {
                document.getElementById('result').innerHTML = `Escuché: "${transcript}". Intenta de nuevo.`;
            }
        };

        function updateExercise() {
            document.getElementById('prog').style.width = (current / 5 * 100) + "%";
            document.getElementById('target').innerText = exercises[current].t;
            document.getElementById('type-label').innerText = `${exercises[current].type} ${current + 1} de 5`;
            document.getElementById('result').innerText = "";
        }
    </script>
</body>
</html>
