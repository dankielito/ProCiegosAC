<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Ciegos | English Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- SIDEBAR ELITE -->
    <aside class="elite-sidebar">
        <div class="sidebar-brand">
            <div class="brand-accent"></div>
            <i class="fas fa-universal-access gold-icon"></i>
            <span class="brand-name">PRO-CIEGOS</span>
        </div>

        <div class="user-brief">
            <div class="avatar-frame">
                <!-- Cambiado para usar tu imagen perfil.png -->
                <img id="user-avatar" src="img/perfil.png" alt="Perfil">
            </div>
            <div class="user-info-text">
                <p class="u-name" id="display-username">Cargando...</p>
                <p class="u-role">Estudiante</p>
            </div>
        </div>

        <nav class="elite-nav">
            <a href="dashboard.html" class="nav-item active">
                <i class="fas fa-graduation-cap"></i>
                <span>Aprender</span>
                <div class="active-indicator"></div>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>Diccionario</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-trophy"></i>
                <span>Ranking</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Tienda</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-ticket-alt"></i>
                <span>Canjear Tarjeta</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-user-circle"></i>
                <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="logout-card-elite">
                <i class="fas fa-sign-out-alt"></i>
                <span>SALIR</span>
            </a>
        </div>
    </aside>

    <!-- VIEWPORT PRINCIPAL -->
    <div class="main-viewport">
        <header class="top-nav">
            <div class="header-left">
                <div class="header-stat"><i class="fas fa-bolt"></i> 5 DÍAS</div>
            </div>
            
            <div class="header-brand">PRO-CIEGOS</div>
            
            <div class="header-right">
                <div class="header-stat"><i class="fas fa-gem"></i> 120</div>
                <div class="header-stat xp"><i class="fas fa-star"></i> 450 XP</div>
            </div>
        </header>

        <div class="split-screen">
            <!-- MAPA DE NIVELES -->
            <section class="map-area" id="map-canvas"></section>

            <!-- PANEL DE GUÍA -->
            <section class="guide-area">
                <div class="guide-wrapper">
                    <img src="img/mapache.png" alt="Guía" class="guide-img">
                    <div class="mission-card">
                        <span class="tag">Misión de hoy</span>
                        <p>Completa la unidad de <strong>Greetings (Saludos)</strong> para ganar tu primera medalla de oro.</p>
                        <div class="p-bar-container">
                            <div class="p-bar-fill" style="width: 45%;"></div>
                        </div>
                        <span class="p-text">45% del objetivo alcanzado</span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const nivelActual = 1;

        async function checkSession() {
            try {
                const response = await fetch('/api/user-data');
                const data = await response.json();

                if (data.loggedIn) {
                    // Actualizamos el nombre desde la DB
                    document.getElementById('display-username').textContent = data.username;
                    
                    // Aseguramos que use perfil.png. 
                    // Nota: Si la imagen no carga, puedes poner un "onerror" para el avatar de letras.
                    const avatarImg = document.getElementById('user-avatar');
                    avatarImg.src = "img/perfil.png"; 
                    
                    avatarImg.onerror = function() {
                        // Fallback por si perfil.png no existe en la carpeta img/
                        this.src = `https://ui-avatars.com/api/?name=${data.username}&background=D4AF37&color=003366&bold=true`;
                    };

                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error("Error verificando sesión:", error);
                window.location.href = 'login.html';
            }
        }

        function initMap() {
            const canvas = document.getElementById('map-canvas');
            const biomas = [
                { title: 'Básico 1', img: 'fondoPlaya.png', range: [1, 5] },
                { title: 'Intermedio', img: 'fondoJungla.png', range: [6, 10] },
                { title: 'Avanzado', img: 'fondoLava.png', range: [11, 15] },
                { title: 'Experto', img: 'fondoNieve.png', range: [16, 20] }
            ];

            biomas.forEach((bioma, bIdx) => {
                const zone = document.createElement('div');
                zone.className = 'map-zone';
                zone.style.backgroundImage = `linear-gradient(rgba(10, 25, 47, 0.85), rgba(10, 25, 47, 0.85)), url('img/${bioma.img}')`;

                for (let i = bioma.range[0]; i <= bioma.range[1]; i++) {
                    const nodeWrapper = document.createElement('div');
                    nodeWrapper.className = 'node-wrapper';
                    
                    const btn = document.createElement('button');
                    btn.className = `level-node ${i < nivelActual ? 'done' : i === nivelActual ? 'active' : 'locked'}`;
                    
                    btn.innerHTML = i < nivelActual ? '<i class="fas fa-check"></i>' : 
                                    i === nivelActual ? '<i class="fas fa-play"></i>' : 
                                    '<i class="fas fa-lock"></i>';

                    btn.onclick = () => { 
                        if(i <= nivelActual) {
                            window.location.href=`nivel.html?n=${i}`; 
                        } else {
                            Swal.fire({
                                icon: 'lock',
                                title: 'Acceso Restringido',
                                text: 'Debes completar las lecciones anteriores.',
                                confirmButtonColor: '#D4AF37',
                                background: '#0a192f',
                                color: '#fff'
                            });
                        }
                    };
                    
                    nodeWrapper.appendChild(btn);
                    zone.appendChild(nodeWrapper);
                }
                canvas.appendChild(zone);

                if(bIdx < biomas.length - 1) {
                    const line = document.createElement('div');
                    line.className = 'path-line';
                    canvas.appendChild(line);
                }
            });
        }

        window.onload = () => {
            checkSession();
            initMap();
        };
    </script>
</body>
</html>
