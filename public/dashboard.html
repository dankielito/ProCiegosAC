<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Ciegos | English Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- SIDEBAR ELITE -->
    <aside class="elite-sidebar">
        <div class="sidebar-brand">
            <div class="brand-accent"></div>
            <i class="fas fa-universal-access gold-icon"></i>
            <span class="brand-name">PRO-CIEGOS</span>
        </div>

        <div class="user-brief">
            <div class="avatar-frame">
                <img id="user-avatar" src="img/perfil.png" alt="Perfil">
            </div>
            <div class="user-info-text">
                <p class="u-name" id="display-username">Cargando...</p>
                <p class="u-role">Estudiante</p>
            </div>
        </div>

        <nav class="elite-nav">
            <a href="dashboard.html" class="nav-item active">
                <i class="fas fa-graduation-cap"></i>
                <span>Aprender</span>
                <div class="active-indicator"></div>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>Diccionario</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-trophy"></i>
                <span>Ranking</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Tienda</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-ticket-alt"></i>
                <span>Canjear Tarjeta</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-user-circle"></i>
                <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="logout-card-elite">
                <i class="fas fa-sign-out-alt"></i>
                <span>SALIR</span>
            </a>
        </div>
    </aside>

    <!-- VIEWPORT PRINCIPAL -->
    <div class="main-viewport">
        <header class="top-nav">
            <div class="header-left">
                <div class="header-stat"><i class="fas fa-bolt"></i> 5 DÍAS</div>
            </div>
            
            <div class="header-brand">PRO-CIEGOS</div>
            
            <div class="header-right">
                <div class="header-stat"><i class="fas fa-gem"></i> <span id="display-gemas">0</span></div>
                <div class="header-stat xp"><i class="fas fa-star"></i> <span id="display-xp">0</span> XP</div>
            </div>
        </header>

        <div class="split-screen">
            <!-- MAPA DE NIVELES -->
            <section class="map-area" id="map-canvas"></section>

            <!-- PANEL DE GUÍA -->
            <section class="guide-area">
                <div class="guide-wrapper">
                    <img src="img/mapache.png" alt="Guía" class="guide-img">
                    <div class="mission-card">
                        <span class="tag">Progreso del Bioma</span>
                        <p id="mission-text">Completa los desafíos para avanzar al siguiente bioma.</p>
                        <div class="p-bar-container">
                            <div id="main-progress-bar" class="p-bar-fill" style="width: 0%;"></div>
                        </div>
                        <span class="p-text" id="progress-percentage">0% del bioma completado</span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // Esta variable se actualizará con los datos de la DB
        let nivelUsuario = 1; 

        async function checkSession() {
            try {
                const response = await fetch('/api/user-data');
                const data = await response.json();

                if (data.loggedIn) {
                    // Actualizamos interfaz con datos reales de la DB
                    document.getElementById('display-username').textContent = data.username;
                    document.getElementById('display-xp').textContent = data.xp || 0;
                    document.getElementById('display-gemas').textContent = data.gemas || 0;
                    
                    nivelUsuario = data.progreso_bioma || 1;

                    // Manejo de Avatar
                    const avatarImg = document.getElementById('user-avatar');
                    avatarImg.src = "img/perfil.png"; 
                    avatarImg.onerror = function() {
                        this.src = `https://ui-avatars.com/api/?name=${data.username}&background=D4AF37&color=003366&bold=true`;
                    };

                    // Renderizar el mapa después de obtener el nivel
                    initMap();
                    actualizarBarraMision();

                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error("Error verificando sesión:", error);
                window.location.href = 'login.html';
            }
        }

        function actualizarBarraMision() {
            // Calcula progreso basado en el primer bioma (niveles 1-5)
            const porcentaje = Math.min(((nivelUsuario - 1) / 5) * 100, 100);
            document.getElementById('main-progress-bar').style.width = porcentaje + "%";
            document.getElementById('progress-percentage').textContent = Math.round(porcentaje) + "% del bioma completado";
        }

        function initMap() {
            const canvas = document.getElementById('map-canvas');
            canvas.innerHTML = ''; // Limpiar mapa antes de renderizar

            const biomas = [
                { title: 'Playa', img: 'fondoPlaya.png', range: [1, 5], folder: 'Playa', file: 'nivelesPlaya' },
                { title: 'Jungla', img: 'fondoJungla.png', range: [6, 10], folder: 'Jungla', file: 'nivelesJungla' },
                { title: 'Volcán', img: 'fondoLava.png', range: [11, 15], folder: 'Volcan', file: 'nivelesVolcan' },
                { title: 'Nieve', img: 'fondoNieve.png', range: [16, 20], folder: 'Nieve', file: 'nivelesNieve' }
            ];

            biomas.forEach((bioma, bIdx) => {
                const zone = document.createElement('div');
                zone.className = 'map-zone';
                zone.style.backgroundImage = `linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.8)), url('img/${bioma.img}')`;

                // Añadir título del bioma
                const zoneTitle = document.createElement('h3');
                zoneTitle.innerText = bioma.title;
                zoneTitle.style.color = "#D4AF37";
                zoneTitle.style.textAlign = "center";
                zoneTitle.style.marginBottom = "20px";
                zone.appendChild(zoneTitle);

                for (let i = bioma.range[0]; i <= bioma.range[1]; i++) {
                    const nodeWrapper = document.createElement('div');
                    nodeWrapper.className = 'node-wrapper';
                    
                    const btn = document.createElement('button');
                    // done: nivel pasado | active: nivel actual | locked: nivel futuro
                    const status = i < nivelUsuario ? 'done' : i === nivelUsuario ? 'active' : 'locked';
                    btn.className = `level-node ${status}`;
                    
                    btn.innerHTML = i < nivelUsuario ? '<i class="fas fa-check"></i>' : 
                                    i === nivelUsuario ? '<i class="fas fa-play"></i>' : 
                                    '<i class="fas fa-lock"></i>';

                    btn.onclick = () => { 
                        if(i <= nivelUsuario) {
                            // REDIRECCIÓN DINÁMICA A LA CARPETA CORRESPONDIENTE
                            window.location.href=`niveles/${bioma.folder}/${bioma.file}.html?n=${i}`; 
                        } else {
                            Swal.fire({
                                icon: 'lock',
                                title: 'Nivel Bloqueado',
                                text: 'Completa los niveles anteriores para desbloquear este bioma.',
                                confirmButtonColor: '#D4AF37',
                                background: '#0a192f',
                                color: '#fff'
                            });
                        }
                    };
                    
                    nodeWrapper.appendChild(btn);
                    zone.appendChild(nodeWrapper);
                }
                canvas.appendChild(zone);

                if(bIdx < biomas.length - 1) {
                    const line = document.createElement('div');
                    line.className = 'path-line';
                    canvas.appendChild(line);
                }
            });
        }

        window.onload = () => {
            checkSession();
        };
    </script>
</body>
</html>
