<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pro-Ciegos A.C.</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- SIDEBAR FIJA -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="img/logo.png" alt="Logo">
            <h2>PRO-CIEGOS</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active"><i class="fas fa-home"></i> Aprender</a>
            <a href="#" class="nav-item"><i class="fas fa-book"></i> Diccionario</a>
            <a href="#" class="nav-item"><i class="fas fa-trophy"></i> Clasificación</a>
            <a href="#" class="nav-item"><i class="fas fa-store"></i> Tienda</a>
            <a href="#" class="nav-item"><i class="fas fa-user-circle"></i> Perfil</a>
        </nav>
    </aside>

    <!-- CONTENEDOR PRINCIPAL DIVIDIDO -->
    <div class="main-wrapper">
        
        <!-- HEADER DE ESTADÍSTICAS -->
        <header class="top-bar">
            <div class="stats-container">
                <div class="stat-bubble xp"><i class="fas fa-fire"></i> <span id="xp-count">0</span></div>
                <div class="stat-bubble gems"><i class="fas fa-gem"></i> <span id="gem-count">0</span></div>
                <div class="stat-bubble streak"><i class="fas fa-bolt"></i> <span>5 días</span></div>
            </div>
        </header>

        <main class="split-content">
            <!-- COLUMNA IZQUIERDA: MAPA DE NIVELES (20 niveles en total) -->
            <section class="levels-column" id="levels-container">
                <!-- Se genera dinámicamente con JS -->
            </section>

            <!-- COLUMNA DERECHA: GUÍA (Fija) -->
            <section class="guide-column">
                <div class="guide-content">
                    <img src="img/mapache.png" alt="Mapache" class="raccoon-hero">
                    <div class="speech-bubble-pro">
                        <h3>¡Sigue adelante!</h3>
                        <p>Has llegado muy lejos. Completa los niveles para dominar todos los biomas.</p>
                        <div class="mini-progress">
                            <span>Progreso Total</span>
                            <div class="bar-bg"><div class="bar-fill" id="total-progress-bar"></div></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Simulación de progreso (Nivel actual en el que se encuentra el usuario)
        let nivelProgreso = parseInt(localStorage.getItem('nivelProgreso')) || 1;

        function renderizarMapa() {
            const container = document.getElementById('levels-container');
            // Definición de los 4 biomas (5 niveles cada uno)
            const biomas = [
                { id: 'beach', clase: 'bg-beach', inicio: 1, fin: 5 },
                { id: 'jungle', clase: 'bg-jungle', inicio: 6, fin: 10 },
                { id: 'lava', clase: 'bg-lava', inicio: 11, fin: 15 },
                { id: 'snow', clase: 'bg-snow', inicio: 16, fin: 20 }
            ];

            biomas.forEach((bioma, index) => {
                const section = document.createElement('div');
                section.className = `bioma-wrapper ${bioma.clase}`;
                
                for (let i = bioma.inicio; i <= bioma.fin; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'level-btn';
                    
                    if (i < nivelProgreso) {
                        btn.classList.add('completed');
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                    } else if (i === nivelProgreso) {
                        btn.classList.add('current');
                        btn.innerHTML = '<i class="fas fa-star"></i>';
                    } else {
                        btn.classList.add('locked');
                        btn.innerHTML = '<i class="fas fa-lock"></i>';
                    }

                    btn.onclick = () => {
                        if (i <= nivelProgreso) {
                            window.location.href = `nivel.html?n=${i}`;
                        } else {
                            Swal.fire({ 
                                title: 'Nivel bloqueado', 
                                text: 'Completa los niveles anteriores para desbloquear este bioma.',
                                icon: 'lock', 
                                confirmButtonColor: '#D4AF37' 
                            });
                        }
                    };
                    section.appendChild(btn);
                }
                
                container.appendChild(section);

                // Agregar línea dorada entre biomas (excepto después del último)
                if (index < biomas.length - 1) {
                    const divider = document.createElement('div');
                    divider.className = 'gold-separator';
                    container.appendChild(divider);
                }
            });

            // Actualizar barra de progreso visual (0 a 100%)
            const percent = (nivelProgreso / 20) * 100;
            document.getElementById('total-progress-bar').style.width = `${percent}%`;
        }

        window.onload = renderizarMapa;
    </script>
</body>
</html>
