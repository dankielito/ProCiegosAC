<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Ciegos | English Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- SIDEBAR ESTILO UI DESIGN -->
    <aside class="modern-sidebar">
        <div class="sidebar-top">
            <div class="user-profile-section">
                <div class="avatar-wrapper">
                    <img src="img/user-avatar.png" alt="Perfil" onerror="this.src='https://ui-avatars.com/api/?name=Alexis+Romero&background=003366&color=fff'">
                </div>
                <div class="user-info">
                    <span class="user-name">Alexis Romero</span>
                    <span class="user-role">Estudiante</span>
                </div>
            </div>
        </div>

        <nav class="sidebar-links">
            <a href="#" class="s-link active">
                <div class="icon-shape"><i class="fas fa-graduation-cap"></i></div>
                <span>Aprender</span>
            </a>
            <a href="#" class="s-link">
                <div class="icon-shape"><i class="fas fa-book-open"></i></div>
                <span>Diccionario</span>
            </a>
            <a href="#" class="s-link">
                <div class="icon-shape"><i class="fas fa-trophy"></i></div>
                <span>Ranking</span>
            </a>
            <a href="#" class="s-link">
                <div class="icon-shape"><i class="fas fa-shopping-cart"></i></div>
                <span>Tienda</span>
            </a>
            <a href="#" class="s-link">
                <div class="icon-shape"><i class="fas fa-ticket-alt"></i></div>
                <span>Canjear Tarjeta</span>
            </a>
            <a href="#" class="s-link">
                <div class="icon-shape"><i class="fas fa-user-circle"></i></div>
                <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="index.html" class="logout-card">
                <i class="fas fa-sign-out-alt"></i>
                <span>Salir</span>
            </a>
        </div>
    </aside>

    <!-- VIEWPORT PRINCIPAL -->
    <div class="main-viewport">
        <header class="top-nav">
            <div class="header-left">
                <div class="header-stat"><i class="fas fa-bolt"></i> 5 DÍAS</div>
            </div>
            
            <div class="header-brand">PRO-CIEGOS</div>
            
            <div class="header-right">
                <div class="header-stat"><i class="fas fa-gem"></i> 120</div>
                <div class="header-stat xp"><i class="fas fa-star"></i> 450 XP</div>
            </div>
        </header>

        <div class="split-screen">
            <!-- MAPA DE NIVELES -->
            <section class="map-area" id="map-canvas"></section>

            <!-- PANEL DE GUÍA -->
            <section class="guide-area">
                <div class="guide-wrapper">
                    <img src="img/mapache.png" alt="Guía" class="guide-img">
                    <div class="mission-card">
                        <span class="tag">Misión de hoy</span>
                        <p>Completa la unidad de <strong>Greetings (Saludos)</strong> para ganar tu primera medalla de oro.</p>
                        <div class="p-bar-container">
                            <div class="p-bar-fill" style="width: 45%;"></div>
                        </div>
                        <span class="p-text">45% del objetivo alcanzado</span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const nivelActual = 1;

        function initMap() {
            const canvas = document.getElementById('map-canvas');
            const biomas = [
                { title: 'Básico 1', img: 'fondoPlaya.png', range: [1, 5] },
                { title: 'Intermedio', img: 'fondoJungla.png', range: [6, 10] },
                { title: 'Avanzado', img: 'fondoLava.png', range: [11, 15] },
                { title: 'Experto', img: 'fondoNieve.png', range: [16, 20] }
            ];

            biomas.forEach((bioma, bIdx) => {
                const zone = document.createElement('div');
                zone.className = 'map-zone';
                zone.style.backgroundImage = `linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.8)), url('img/${bioma.img}')`;

                for (let i = bioma.range[0]; i <= bioma.range[1]; i++) {
                    const nodeWrapper = document.createElement('div');
                    nodeWrapper.className = 'node-wrapper';
                    
                    const btn = document.createElement('button');
                    btn.className = `level-node ${i < nivelActual ? 'done' : i === nivelActual ? 'active' : 'locked'}`;
                    btn.innerHTML = i < nivelActual ? '<i class="fas fa-check"></i>' : 
                                    i === nivelActual ? '<i class="fas fa-play"></i>' : 
                                    '<i class="fas fa-lock"></i>';

                    btn.onclick = () => { if(i <= nivelActual) window.location.href=`nivel.html?n=${i}`; };
                    
                    nodeWrapper.appendChild(btn);
                    zone.appendChild(nodeWrapper);
                }
                canvas.appendChild(zone);
                if(bIdx < biomas.length - 1) {
                    const line = document.createElement('div');
                    line.className = 'path-line';
                    canvas.appendChild(line);
                }
            });
        }
        window.onload = initMap;
    </script>
</body>
</html>
